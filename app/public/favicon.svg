<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#15803d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#000000"/>
  <!-- Connecting edges -->
  <line x1="8" y1="8" x2="16" y2="16" stroke="url(#g2)" stroke-width="1.2"/>
  <line x1="24" y1="8" x2="16" y2="16" stroke="url(#g2)" stroke-width="1.2"/>
  <line x1="8" y1="24" x2="16" y2="16" stroke="url(#g2)" stroke-width="1.2"/>
  <line x1="24" y1="24" x2="16" y2="16" stroke="url(#g2)" stroke-width="1.2"/>
  <line x1="8" y1="8" x2="24" y2="8" stroke="url(#g2)" stroke-width="1"/>
  <line x1="8" y1="8" x2="8" y2="24" stroke="url(#g2)" stroke-width="1"/>
  <line x1="24" y1="8" x2="24" y2="24" stroke="url(#g2)" stroke-width="1"/>
  <line x1="8" y1="24" x2="24" y2="24" stroke="url(#g2)" stroke-width="1"/>
  <line x1="8" y1="8" x2="24" y2="24" stroke="url(#g2)" stroke-width="0.8"/>
  <line x1="24" y1="8" x2="8" y2="24" stroke="url(#g2)" stroke-width="0.8"/>
  <!-- Outer nodes -->
  <circle cx="8" cy="8" r="2.5" fill="url(#g)"/>
  <circle cx="24" cy="8" r="2.5" fill="url(#g)"/>
  <circle cx="8" cy="24" r="2.5" fill="url(#g)"/>
  <circle cx="24" cy="24" r="2.5" fill="url(#g)"/>
  <!-- Central node (larger) -->
  <circle cx="16" cy="16" r="3.5" fill="url(#g)"/>
  <circle cx="16" cy="16" r="1.5" fill="#000000"/>
</svg>
